name = "inspectorhub-core-shared"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = true

[assets]
directory = "./public"

[vars]
ENVIRONMENT = "production"
APP_NAME = "InspectorHub Software"
PRIMARY_COLOR = "#4f46e5"
# Shared SaaS core URL
APP_BASE_URL = "https://app.inspectorhub.io"
APP_MODE = "saas"

# ── SaaS Portal Integration ──────────────────────────────────────────────
# These must be set via `wrangler secret put` for production
# PORTAL_API_URL = "https://portal.inspectorhub.io/api/integration"
# PORTAL_M2M_SECRET = "..."

# ── Cloudflare Turnstile ──────────────────────────────────────────────────
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"

# ── Resource Bindings ──────────────────────────────────────────────────────
# SaaS typically uses a single large D1 and partitioned keys in KV/R2.
# These will be bound to the production resources of the SaaS platform.

[[d1_databases]]
binding = "DB"
database_name = "inspectorhub-core-db-shared"
database_id = "b36e8f6a-4e1a-49f8-8a84-799ebf2134f3"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "TENANT_CACHE"
id = "3b6c0d581fe440b394de3967c51907bc"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "inspectorhub-core-bucket-shared"

[observability]
enabled = true

[[routes]]
pattern = "app.inspectorhub.io"
custom_domain = true
