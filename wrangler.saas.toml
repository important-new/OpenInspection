# SaaS deployment template — multi-tenant control-plane-fronted worker.
# Fill in real resource IDs + route domain before deploying, OR run
# `node scripts/setup-cloudflare.js --config wrangler.saas.toml` to provision
# resources automatically.
name = "your-saas-worker-name"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = true

[assets]
directory = "./public"

[vars]
ENVIRONMENT = "production"
APP_NAME = "Your SaaS Brand"
PRIMARY_COLOR = "#4f46e5"
# Shared SaaS core URL — replace with your own domain
APP_BASE_URL = "https://app.your-domain.com"
APP_MODE = "saas"

# ── SaaS Portal Integration ──────────────────────────────────────────────
# These must be set via `wrangler secret put` for production
# PORTAL_API_URL = "https://portal.your-domain.com/api/integration"
# PORTAL_M2M_SECRET = "..."

# ── Cloudflare Turnstile ──────────────────────────────────────────────────
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"

# ── Resource Bindings ──────────────────────────────────────────────────────
# SaaS typically uses a single large D1 and partitioned keys in KV/R2.
# Replace placeholders with your real resource IDs (or use setup script).

[[d1_databases]]
binding = "DB"
database_name = "your-saas-db-name"
# Placeholder — substitute with your real D1 ID
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "TENANT_CACHE"
# Placeholder — substitute with your real KV namespace ID
id = "00000000000000000000000000000000"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "your-saas-photos-bucket"

[observability]
enabled = true

[[routes]]
# Replace with your own custom domain
pattern = "app.your-domain.com"
custom_domain = true

[triggers]
crons = ["* * * * *", "0 2 * * *"]
