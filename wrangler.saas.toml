name = "openinspection-saas"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = true

[assets]
directory = "./public"

[vars]
ENVIRONMENT = "production"
APP_NAME = "InspectorHub"
PRIMARY_COLOR = "#4f46e5"
# Shared SaaS core URL
APP_BASE_URL = "https://core.inspectorhub.cloud"
APP_MODE = "saas"

# ── SaaS Portal Integration ──────────────────────────────────────────────
# These must be set via `wrangler secret put` for production
# PORTAL_API_URL = "https://portal.inspectorhub.cloud/api/integration"
# PORTAL_M2M_SECRET = "..."

# ── Cloudflare Turnstile ──────────────────────────────────────────────────
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"

# ── Resource Bindings ──────────────────────────────────────────────────────
# SaaS typically uses a single large D1 and partitioned keys in KV/R2.
# These will be bound to the production resources of the SaaS platform.

[[d1_databases]]
binding = "DB"
database_name = "inspectorhub-saas-db"
database_id = "PASTE_D1_ID_HERE"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "TENANT_CACHE"
id = "PASTE_KV_ID_HERE"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "inspectorhub-saas-photos"

[observability]
enabled = true
