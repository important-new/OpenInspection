name: CI

# Quality gate for pull requests. Every check below must pass before a PR is
# merged — wire this up as a required status check in branch protection
# (Settings → Branches → Require status checks → "verify").
on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        # Full history so scripts/gen-version.js can read the commit/branch.
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # server/generated/version.ts is git-ignored and produced by the build;
      # type-check imports it, so stamp it before type-check on a fresh checkout.
      - name: Generate version stamp
        run: npm run gen-version

      - name: Type-check (react-router typegen + tsc app + api)
        run: npm run type-check

      # Type-only test project: expectTypeOf(...) assertions in tests/**/*.spec-d.ts
      # are a runtime no-op under plain vitest run — this is the only thing that
      # actually type-checks them. tsc needs a larger heap for this codebase's
      # AdminApi-scale intersection types (mirrors type-check:api's own bump).
      - name: Type-only tests (vitest --typecheck)
        run: npm run test:types

      - name: Lint
        run: npm run lint

      - name: Migration drift gate (schema vs migrations)
        run: npm run db:check

      - name: API unit tests
        run: npm run test:unit

      - name: Worker-runtime tests (queues)
        run: npm run test:workers

      - name: Web unit tests
        run: npm run test:web

      - name: Build (bundle the Worker)
        run: npm run build

      # Bundle-size gate (Workers Free 3 MiB gzipped). Reuses the build/ output
      # from the previous step (--skip-build); also enforced in pre-commit.
      - name: Bundle size gate
        run: npm run check:bundle -- --skip-build

  # Seeded Playwright E2E against the real built worker. Runs in parallel with
  # `verify` (independent). playwright.config.ts's `webServer` builds the worker
  # and boots `wrangler dev` on :8789; `globalSetup` truncates + migrates + seeds
  # local D1 so every spec exercises the actual database. Auth is standalone-mode
  # only (the local login form) — saas login is a portal handoff and is out of
  # scope for this repo's CI.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # build (via webServer) imports server/generated/version.ts.
      - name: Generate version stamp
        run: npm run gen-version

      # Provision a throwaway .dev.vars (ES256 keypair + JWT_SECRET + SETUP_CODE)
      # that `wrangler dev` reads at boot. Without it the worker has no JWT keys
      # and /api/auth/setup fails. Idempotent; all values freshly generated.
      - name: Provision ephemeral E2E secrets
        run: node scripts/gen-e2e-dev-vars.mjs

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright, seeded D1)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
