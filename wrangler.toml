name = "openinspection"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

[assets]
directory = "./public"

[vars]
ENVIRONMENT = "production"
# Cloudflare Turnstile site key — replace with your key from dash.cloudflare.com → Turnstile
# The value below is Cloudflare's official always-pass test key (safe to use until you go live)
TURNSTILE_SITE_KEY = "1x00000000000000000000AA"
# Your deployed Worker URL — used to build Google OAuth callback URIs
# Replace with your actual Workers subdomain after first deploy, e.g. "https://openinspection.your-subdomain.workers.dev"
APP_BASE_URL = "https://openinspection.workers.dev"

# ── Branding Customization (Global Defaults) ──────────────────────────────
APP_NAME = "OpenInspection"
PRIMARY_COLOR = "#4f46e5"
SENDER_EMAIL = "OpenInspection <noreply@example.com>"
BILLING_URL = "https://example.com/pricing"
SUPPORT_EMAIL = "support@example.com"
APP_MODE = "standalone"
SINGLE_TENANT_ID = "00000000-0000-0000-0000-000000000000"
SETUP_CODE = "" # Optional: Set a custom 6-digit code for first-time setup

# ── Secrets — set via: wrangler secret put SECRET_NAME ──────────────────────
# Run `npm run setup:cloudflare` to be prompted for each one interactively.
#
# JWT_SECRET              — Required. HS256 signing key (any long random string)
# RESEND_API_KEY          — Optional. Resend.com API key for email delivery
# SENDER_EMAIL            — Optional. Verified sender address, e.g. "Reports <reports@yourdomain.com>"
# GEMINI_API_KEY          — Optional. Google Gemini API key for AI comment assist
# TURNSTILE_SECRET_KEY    — Optional. Server-side Turnstile key (skipped if absent)
# GOOGLE_CLIENT_ID        — Optional. Google Calendar OAuth client ID
# GOOGLE_CLIENT_SECRET    — Optional. Google Calendar OAuth client secret

# ── Cloudflare resource bindings ─────────────────────────────────────────────
# These IDs are populated automatically by `npm run setup:cloudflare`.
# The Cloudflare Deploy Button will also handle database and KV creation.

[[d1_databases]]
binding = "DB"
database_name = "openinspection-db"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "TENANT_CACHE"

[observability]
enabled = true

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "openinspection-photos"
